<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="dashboard.css" />
    <title>Tabulate</title>
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <img src="icons/icon48.png" alt="" class="brand-logo" />
          <span class="brand-name">Tabulate</span>
        </div>
        <nav id="nav">
          <a href="#overview" data-view="overview"><span class="ico">◫</span>Overview</a>
          <a href="#clusters" data-view="clusters"><span class="ico">⛶</span>Clusters</a>
          <a href="#archived" data-view="archived"><span class="ico">▤</span>Archived</a>
          <a href="#settings" data-view="settings"><span class="ico">⚙</span>Settings</a>
        </nav>
        <div class="sidebar-foot">
          <div class="kbd-hint"><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd>switch views</div>
          <span class="muted">AI tab manager</span>
          <span class="muted" id="version">v0.3.0</span>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <h1 id="title">Overview</h1>
          <button id="quickswitch" class="qs-btn" title="Quick switch to any open tab">
            <span class="qs-ico">⌕</span>Quick switch<kbd>⌘K</kbd>
          </button>
          <div id="actions" class="actions"></div>
        </header>
        <section id="content" class="content"></section>
      </main>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
